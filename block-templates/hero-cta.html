<!-- wp:group {"align":"full","style":{"spacing":{"padding":{"top":"120px","bottom":"120px","left":"40px","right":"40px"}}},"backgroundColor":"primary","layout":{"type":"constrained"}} -->
<div
  class="wp-block-group alignfull has-primary-background-color has-background"
  style="
    padding-top: 120px;
    padding-bottom: 120px;
    padding-left: 40px;
    padding-right: 40px;
  "
>
  <!-- wp:heading {"level":1,"align":"wide","style":{"typography":{"fontSize":"clamp(2.4rem, 6vw, 4.5rem)","lineHeight":"1.1","fontWeight":"700"},"color":{"text":"#ffffff"}}} -->

    class="wp-block-heading alignwide has-white-color has-text-color"
    style="
      font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 700;
      line-height: 1.1;
    "
  >
    Your compelling headline goes here
  </h1>

  <!-- wp:paragraph {"style":{"typography":{"fontSize":"1.2rem"},"color":{"text":"rgba(255,255,255,0.8)"},"spacing":{"margin":{"top":"24px","bottom":"40px"}}}} -->

    class="has-text-color"
    style="
      font-size: 1.2rem;
      color: rgba(255, 255, 255, 0.8);
      margin-top: 24px;
      margin-bottom: 40px;
    "
  >
    A short supporting sentence that explains what you do and why it matters to
    your visitor. Keep it to two lines max.
  </p>
  <!-- /wp:paragraph -->

  <!-- wp:buttons -->
  <div class="wp-block-buttons">

      <a
        class="wp-block-button__link has-white-background-color has-primary-color has-text-color has-background"
        style="
          border-radius: 4px;
          font-weight: 600;
          padding-top: 16px;
          padding-bottom: 16px;
          padding-left: 36px;
          padding-right: 36px;
        "

      >
    </div>
    <!-- /wp:button -->

    <!-- wp:button {"className":"is-style-outline","style":{"color":{"text":"#ffffff","background":"transparent"},"border":{"radius":"4px","color":"rgba(255,255,255,0.5)","width":"1px"},"spacing":{"padding":{"top":"16px","bottom":"16px","left":"36px","right":"36px"}}}} -->

      <a
        class="wp-block-button__link has-white-color has-text-color"
        style="
          border-radius: 4px;
          border: 1px solid rgba(255, 255, 255, 0.5);
          padding-top: 16px;
          padding-bottom: 16px;
          padding-left: 36px;
